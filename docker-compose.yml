services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: soul-app:local
    volumes:
      - ./soul_data:/app/soul_data
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./soul_data/db/soul.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    stdin_open: true
    tty: true
    command: ["chat"]
    depends_on:
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: soul-app:local
    entrypoint: ["python"]
    volumes:
      - ./soul_data:/app/soul_data
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./soul_data/db/soul.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    command: ["-m", "scripts.worker"]
    depends_on:
      redis:
        condition: service_started

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: soul-app:local
    entrypoint: ["python"]
    volumes:
      - ./soul_data:/app/soul_data
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./soul_data/db/soul.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    command: ["-m", "scripts.beat"]
    depends_on:
      redis:
        condition: service_started

  test:
    build:
      context: .
      dockerfile: Dockerfile
    image: soul-app:local
    entrypoint: ["python"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./soul_data/db/soul.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-test}
    volumes:
      - ./:/app
    command: ["-m", "pytest", "-q"]
    depends_on:
      redis:
        condition: service_started
